<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LENS — AI Image Captioning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --amber: #f59e0b;
    --amber-glow: rgba(245,158,11,0.3);
    --emerald: #10b981;
    --rose: #f43f5e;
    --dark: #0a0a0f;
    --surface: rgba(255,255,255,0.03);
    --surface2: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.07);
    --text: rgba(255,255,255,0.85);
    --muted: rgba(255,255,255,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg-noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.6;
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(245,158,11,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 10% 90%, rgba(16,185,129,0.05) 0%, transparent 60%);
  }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 10;
    max-width: 900px; margin: 0 auto;
    padding: 48px 24px 80px;
    display: flex; flex-direction: column; gap: 40px;
    animation: fadeIn 0.8s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── Header ── */
  header { display: flex; flex-direction: column; gap: 10px; }

  .logo-row { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--amber), #ff8c00);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px var(--amber-glow), 0 8px 24px rgba(0,0,0,0.4);
    animation: iconPulse 4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes iconPulse {
    0%,100% { box-shadow: 0 0 20px var(--amber-glow); }
    50% { box-shadow: 0 0 40px rgba(245,158,11,0.6), 0 0 80px rgba(245,158,11,0.2); }
  }

  .logo-text {
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(90deg, #fff 30%, var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--muted);
    letter-spacing: 1px; padding-left: 62px;
  }

  .badge-row { display: flex; gap: 8px; padding-left: 62px; flex-wrap: wrap; }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid; text-transform: uppercase;
  }
  .badge-amber { border-color: rgba(245,158,11,0.3); color: var(--amber); background: rgba(245,158,11,0.07); }
  .badge-emerald { border-color: rgba(16,185,129,0.3); color: var(--emerald); background: rgba(16,185,129,0.06); }
  .badge-muted { border-color: var(--border); color: var(--muted); background: var(--surface); }

  /* ── API Key input ── */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .api-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; display: flex; align-items: center; gap: 8px;
  }
  .api-label::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--amber); box-shadow: 0 0 8px var(--amber);
  }
  .api-row { display: flex; gap: 10px; }
  .api-input {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .api-input:focus {
    border-color: rgba(245,158,11,0.4);
    box-shadow: 0 0 16px rgba(245,158,11,0.1);
  }
  .api-input::placeholder { color: rgba(255,255,255,0.15); }
  .api-hint {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted);
  }
  .api-hint a { color: var(--amber); text-decoration: none; }
  .api-hint a:hover { text-decoration: underline; }

  /* ── Upload zone ── */
  .upload-zone {
    border: 2px dashed rgba(245,158,11,0.2);
    border-radius: 20px; padding: 48px 24px;
    text-align: center; cursor: pointer;
    background: var(--surface);
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: rgba(245,158,11,0.5);
    background: rgba(245,158,11,0.04);
    box-shadow: 0 0 40px rgba(245,158,11,0.08), inset 0 0 40px rgba(245,158,11,0.03);
  }
  .upload-zone.has-image { padding: 0; border-style: solid; cursor: default; }

  .upload-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .upload-title { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
  .upload-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  #fileInput { display: none; }

  .preview-img {
    width: 100%; max-height: 420px;
    object-fit: contain; border-radius: 18px;
    display: block;
  }

  .img-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    border-radius: 0 0 18px 18px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .img-name {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: rgba(255,255,255,0.5); letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;
  }
  .change-btn {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--amber); cursor: pointer; background: none; border: none;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid rgba(245,158,11,0.3);
    transition: all 0.2s;
  }
  .change-btn:hover { background: rgba(245,158,11,0.1); }

  /* ── Generate button ── */
  .generate-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(255,140,0,0.15));
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 14px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 2px; color: var(--amber); text-transform: uppercase;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .generate-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(255,140,0,0.25));
    box-shadow: 0 0 30px rgba(245,158,11,0.25), 0 8px 24px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .generate-btn.loading { pointer-events: none; }

  /* ── Result ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0; transform: translateY(16px);
  }
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }

  .result-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; display: flex; align-items: center; gap: 8px;
  }
  .result-label::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--emerald); box-shadow: 0 0 8px var(--emerald);
    animation: blink 2s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .copy-btn {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 12px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
  }
  .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .result-body { padding: 24px; }
  .caption-text {
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 600; line-height: 1.5;
    color: #fff; letter-spacing: -0.3px;
  }
  .caption-text .word {
    display: inline-block;
    animation: wordIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  .result-meta {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .meta-item {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); display: flex; align-items: center; gap: 6px;
  }
  .meta-val { color: rgba(255,255,255,0.6); }

  /* ── Loading ── */
  .loading-box {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding: 40px;
  }
  .scan-line {
    width: 100%; height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    animation: scan 1.5s ease-in-out infinite;
  }
  @keyframes scan { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  .loading-text {
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted);
    letter-spacing: 2px;
  }

  /* ── Error ── */
  .error-card {
    background: rgba(244,63,94,0.07);
    border: 1px solid rgba(244,63,94,0.25);
    border-radius: 14px; padding: 16px 20px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: rgba(244,63,94,0.8); display: flex; gap: 10px; align-items: flex-start;
    animation: slideUp 0.3s ease forwards; opacity: 0;
  }

  /* ── History ── */
  .history-section { display: flex; flex-direction: column; gap: 16px; }
  .history-title {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  }
  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .history-item {
    border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .history-item:hover { border-color: rgba(245,158,11,0.3); transform: translateY(-2px); }
  .history-item img { width:100%; height: 100px; object-fit: cover; display: block; }
  .history-caption {
    padding: 8px 10px; font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  @keyframes wordIn {
    0% { opacity:0; transform: translateY(8px); }
    100% { opacity:1; transform: translateY(0); }
  }

  @media (max-width: 500px) {
    .page { padding: 28px 16px 60px; gap: 28px; }
    .tagline, .badge-row { padding-left: 0; margin-top: 8px; }
    .logo-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  }
</style>
</head>
<body>

<div class="bg-noise"></div>
<div class="bg-glow"></div>

<div class="page">

  <!-- Header -->
  <header>
    <div class="logo-row">
      <div class="logo-icon">🔭</div>
      <div class="logo-text">LENS.AI</div>
    </div>
    <div class="tagline">// computer vision · natural language generation</div>
    <div class="badge-row">
      <span class="badge badge-amber">BLIP Model</span>
      <span class="badge badge-emerald">Transformer</span>
      <span class="badge badge-muted">CodSoft Task 3</span>
    </div>
  </header>

  <!-- API Key -->
  <div class="api-section">
    <div class="api-label">Hugging Face API Token</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKey"
             placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"/>
    </div>
    <div class="api-hint">
      Free token at <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>
      — Uses <strong style="color:rgba(255,255,255,0.5)">Salesforce/blip-image-captioning-large</strong>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone"
       ondragover="handleDrag(event)" ondragleave="handleDragLeave(event)"
       ondrop="handleDrop(event)" onclick="triggerUpload()">
    <div id="uploadPlaceholder">
      <div class="upload-icon">📷</div>
      <div class="upload-title">Drop your image here</div>
      <div class="upload-sub">or click to browse · JPG, PNG, WEBP · max 5MB</div>
    </div>
    <img id="previewImg" class="preview-img" style="display:none"/>
    <div class="img-overlay" id="imgOverlay" style="display:none">
      <span class="img-name" id="imgName"></span>
      <button class="change-btn" onclick="triggerUpload(event)">Change</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)"/>

  <!-- Generate -->
  <button class="generate-btn" id="generateBtn" onclick="generateCaption()" disabled>
    ✦ Generate Caption
  </button>

  <!-- Error -->
  <div id="errorBox" style="display:none"></div>

  <!-- Result -->
  <div id="resultCard" style="display:none"></div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">// recent captions</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

</div>

<script>
let currentFile = null;
let history = [];
let startTime = 0;

function triggerUpload(e) {
  if (e) e.stopPropagation();
  document.getElementById('fileInput').click();
}

function handleDrag(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag-over');
}
function handleDragLeave(e) {
  document.getElementById('uploadZone').classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  if (file.size > 5 * 1024 * 1024) {
    showError('Image too large. Please use an image under 5MB.');
    return;
  }
  currentFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    const zone = document.getElementById('uploadZone');
    const placeholder = document.getElementById('uploadPlaceholder');
    const img = document.getElementById('previewImg');
    const overlay = document.getElementById('imgOverlay');
    const nameEl = document.getElementById('imgName');

    placeholder.style.display = 'none';
    img.src = e.target.result;
    img.style.display = 'block';
    overlay.style.display = 'flex';
    nameEl.textContent = file.name;
    zone.classList.add('has-image');
    zone.style.cursor = 'default';

    document.getElementById('generateBtn').disabled = false;
    hideError();
    document.getElementById('resultCard').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function generateCaption() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('Please enter your Hugging Face API token first.'); return; }
  if (!currentFile) { showError('Please upload an image first.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Analyzing...';
  btn.classList.add('loading');
  hideError();
  startTime = Date.now();

  // Show loading
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'block';
  resultCard.className = 'result-card';
  resultCard.innerHTML = `
    <div class="loading-box">
      <div style="width:100%;overflow:hidden;border-radius:2px;background:rgba(255,255,255,0.05)">
        <div class="scan-line"></div>
      </div>
      <div class="loading-text">// scanning image features...</div>
    </div>`;

  try {
    const arrayBuffer = await currentFile.arrayBuffer();
    const response = await fetch(
      'https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-large',
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': currentFile.type
        },
        body: arrayBuffer
      }
    );

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (response.status === 503) {
        throw new Error('Model is loading (cold start). Wait 20s and try again.');
      }
      throw new Error(err.error || `API error ${response.status}`);
    }

    const data = await response.json();
    const caption = Array.isArray(data) ? data[0]?.generated_text : data?.generated_text;
    if (!caption) throw new Error('No caption returned. Try again.');

    showResult(caption, elapsed);

    // Add to history
    const imgSrc = document.getElementById('previewImg').src;
    addHistory(imgSrc, caption);

  } catch (err) {
    resultCard.style.display = 'none';
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Generate Caption';
    btn.classList.remove('loading');
  }
}

function showResult(caption, elapsed) {
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'block';
  resultCard.className = 'result-card';

  const words = caption.split(' ').map((w, i) =>
    `<span class="word" style="animation-delay:${i * 0.05}s">${w} </span>`
  ).join('');

  resultCard.innerHTML = `
    <div class="result-header">
      <div class="result-label">Generated Caption</div>
      <button class="copy-btn" onclick="copyCaption('${caption.replace(/'/g,"\\'")}')">Copy</button>
    </div>
    <div class="result-body">
      <div class="caption-text">${words}</div>
    </div>
    <div class="result-meta">
      <div class="meta-item">Model: <span class="meta-val">BLIP-large</span></div>
      <div class="meta-item">Time: <span class="meta-val">${elapsed}s</span></div>
      <div class="meta-item">Words: <span class="meta-val">${caption.split(' ').length}</span></div>
    </div>`;
}

function copyCaption(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); }
  });
}

function addHistory(imgSrc, caption) {
  history.unshift({ imgSrc, caption });
  if (history.length > 6) history.pop();

  const section = document.getElementById('historySection');
  const grid = document.getElementById('historyGrid');
  section.style.display = 'block';
  grid.innerHTML = history.map(h => `
    <div class="history-item">
      <img src="${h.imgSrc}" alt="history"/>
      <div class="history-caption">${h.caption}</div>
    </div>`).join('');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.style.display = 'flex';
  el.className = 'error-card';
  el.innerHTML = `<span>⚠</span><span>${msg}</span>`;
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>
</body>
</html>
