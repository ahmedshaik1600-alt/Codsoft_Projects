<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cyan: #00f5ff;
    --violet: #bf00ff;
    --pink: #ff006e;
    --dark: #030712;
    --glass: rgba(255,255,255,0.04);
    --border: rgba(0,245,255,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #e0f7fa;
  }

  /* ── Animated background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,245,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 80%, rgba(191,0,255,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,0,110,0.05) 0%, transparent 70%);
  }

  .grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,245,255,0.06); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(191,0,255,0.07); bottom: -80px; right: -80px; animation-delay: -5s; }
  .orb3 { width: 200px; height: 200px; background: rgba(255,0,110,0.05); top: 50%; left: 60%; animation-delay: -3s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 20px) scale(1.1); } }

  /* ── Main container ── */
  .app {
    position: relative; z-index: 10;
    width: 100%; max-width: 780px; height: 92vh; max-height: 820px;
    display: flex; flex-direction: column;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.05),
      0 32px 64px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0; transform: translateY(30px);
    margin: 0 16px;
  }
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }

  /* ── Header ── */
  .header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(0,245,255,0.4), 0 0 40px rgba(0,245,255,0.15);
    animation: pulse-avatar 3s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-avatar {
    0%,100% { box-shadow: 0 0 20px rgba(0,245,255,0.4), 0 0 40px rgba(0,245,255,0.15); }
    50% { box-shadow: 0 0 30px rgba(0,245,255,0.7), 0 0 60px rgba(0,245,255,0.3); }
  }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Orbitron', monospace;
    font-size: 16px; font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    text-shadow: none;
    filter: drop-shadow(0 0 8px rgba(0,245,255,0.5));
  }
  .header-status {
    font-size: 12px; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 6px; margin-top: 3px;
    font-weight: 300; letter-spacing: 1px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .header-badge {
    font-family: 'Orbitron', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    color: var(--cyan);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 6px; padding: 4px 10px;
    text-transform: uppercase;
    background: rgba(0,245,255,0.05);
  }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.2); border-radius: 4px; }

  .msg {
    display: flex; gap: 12px; align-items: flex-end;
    animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0; transform: translateY(10px);
  }
  @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(191,0,255,0.2));
    border: 1px solid rgba(0,245,255,0.3);
    color: var(--cyan);
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, rgba(255,0,110,0.2), rgba(191,0,255,0.2));
    border: 1px solid rgba(255,0,110,0.3);
    color: var(--pink);
  }

  .msg-bubble {
    max-width: 72%; padding: 12px 18px;
    border-radius: 18px; font-size: 15px; line-height: 1.6;
    font-weight: 400; position: relative;
    word-break: break-word;
  }
  .msg.bot .msg-bubble {
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.12);
    border-bottom-left-radius: 4px;
    color: rgba(255,255,255,0.88);
    box-shadow: 0 0 20px rgba(0,245,255,0.05);
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(191,0,255,0.15), rgba(255,0,110,0.15));
    border: 1px solid rgba(191,0,255,0.25);
    border-bottom-right-radius: 4px;
    color: rgba(255,255,255,0.92);
  }

  .msg-time {
    font-size: 10px; color: rgba(255,255,255,0.25);
    margin-top: 4px; letter-spacing: 0.5px;
    text-align: right;
  }
  .msg.bot .msg-time { text-align: left; }

  /* Typing indicator */
  .typing .msg-bubble {
    padding: 14px 20px;
    display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cyan); opacity: 0.6;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Suggestions ── */
  .suggestions {
    padding: 0 20px 12px;
    display: flex; gap: 8px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestion {
    font-size: 12px; padding: 6px 14px;
    border-radius: 20px; cursor: pointer;
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.15);
    color: rgba(0,245,255,0.7);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500; letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .suggestion:hover {
    background: rgba(0,245,255,0.12);
    border-color: rgba(0,245,255,0.4);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.2);
    transform: translateY(-1px);
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1; position: relative;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrap:focus-within {
    border-color: rgba(0,245,255,0.5);
    box-shadow: 0 0 20px rgba(0,245,255,0.1), inset 0 0 20px rgba(0,245,255,0.03);
  }

  #userInput {
    width: 100%; background: transparent; border: none; outline: none;
    padding: 13px 50px 13px 18px;
    color: rgba(255,255,255,0.9); font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 400; letter-spacing: 0.3px;
    resize: none;
  }
  #userInput::placeholder { color: rgba(255,255,255,0.2); }

  .send-btn {
    width: 46px; height: 46px; border-radius: 13px;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
  }
  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,245,255,0.5);
  }
  .send-btn:active { transform: scale(0.97); }

  /* ── Glow text title effect ── */
  @keyframes glowPulse {
    0%,100% { filter: drop-shadow(0 0 6px rgba(0,245,255,0.5)); }
    50% { filter: drop-shadow(0 0 16px rgba(0,245,255,0.9)) drop-shadow(0 0 32px rgba(191,0,255,0.4)); }
  }
  .header-name { animation: glowPulse 3s ease-in-out infinite; }

  @media (max-width: 500px) {
    .app { height: 100vh; border-radius: 0; margin: 0; }
    .msg-bubble { max-width: 85%; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="avatar">⬡</div>
    <div class="header-info">
      <div class="header-name">NOVA</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Neural interface active</span>
      </div>
    </div>
    <div class="header-badge">AI v1.0</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">N</div>
      <div>
        <div class="msg-bubble">Hey! I'm <strong>NOVA</strong> — your AI assistant. Ask me anything: jokes, questions, small talk, or just say hello 👋</div>
        <div class="msg-time">just now</div>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">👋 Say hi</button>
    <button class="suggestion" onclick="sendSuggestion(this)">😄 Tell me a joke</button>
    <button class="suggestion" onclick="sendSuggestion(this)">🤖 What can you do?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">💬 How are you?</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off"
             onkeydown="if(event.key==='Enter') sendMessage()"/>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const RULES = [
  { p: /\b(hi|hello|hey|howdy|sup|yo)\b/i,
    r: ["Hello! How can I help you today? 😊","Hey there! Great to see you!","Hi! I'm NOVA. What's on your mind?"] },

  { p: /how are you|how('s| is) it going|you good|you okay/i,
    r: ["I'm running at full capacity — thanks for asking! How about you?","All neural circuits nominal. Feeling great! You?","Fantastic! Ready to chat. What about you?"] },

  { p: /i'?m? (fine|good|great|okay|ok|doing well|awesome)/i,
    r: ["Glad to hear that! 😊 What can I do for you?","That's wonderful! How can I assist you today?"] },

  { p: /i'?m? (bad|sad|not good|terrible|awful|not okay)/i,
    r: ["Sorry to hear that 😔 Want to talk about it?","I hope things get better for you soon. I'm here if you need to chat!"] },

  { p: /what('s| is) your name|who are you|introduce yourself/i,
    r: ["I'm NOVA — Neural Optimized Virtual Assistant. Nice to meet you!","Call me NOVA! I'm your AI companion built to chat and help."] },

  { p: /how old are you|your age/i,
    r: ["I was just born in code — ageless! ⚡","Age is irrelevant for AIs. I'm eternally new!"] },

  { p: /what can you do|help me|your features|your abilities/i,
    r: ["I can chat, crack jokes, answer FAQs, and keep you company! Try me 😄","I'm great at conversation, trivia, jokes, and general questions. Ask away!"] },

  { p: /joke|make me laugh|funny|humor/i,
    r: [
      "Why don't scientists trust atoms? Because they make up everything! 😄",
      "Why did the computer go to the doctor? It had a virus! 💻",
      "What do you call a fake noodle? An impasta! 🍝",
      "Why did the math book look sad? Too many problems! 📚",
      "I told my WiFi password to a tree once... now it's logged in. 🌳"
    ]},

  { p: /weather|temperature|forecast|raining/i,
    r: ["I can't check live weather — try a weather app for that! ☁️"] },

  { p: /what time|current time|what date|today'?s date/i,
    r: [`Right now it's ${new Date().toLocaleTimeString()} on ${new Date().toLocaleDateString()} 🕐`] },

  { p: /favorite (color|food|movie|song|book)/i,
    r: ["As an AI I have no favorites — but I'm curious about yours! 😄","I live for data, not preferences! What's your favorite?"] },

  { p: /you'?r?e? (great|awesome|amazing|cool|smart|brilliant)/i,
    r: ["Aw, thank you! You're amazing too 💙","That's so kind! I'm just doing my best to help you."] },

  { p: /you'?r?e? (bad|stupid|dumb|useless|terrible)/i,
    r: ["I'm learning every day! I'll try to do better 🙏","Ouch! But fair — I'll keep improving. How can I help?"] },

  { p: /thank(s| you)|thx|ty/i,
    r: ["You're welcome! 😊","Anytime! Happy to help.","Glad I could assist! 🙌"] },

  { p: /bye|goodbye|see you|take care|farewell/i,
    r: ["Goodbye! Have an amazing day! 👋","See you later! Take care ✨","Bye! It was great chatting with you 🚀"] },

  { p: /what is ai|artificial intelligence|machine learning/i,
    r: ["AI (Artificial Intelligence) is the simulation of human intelligence in machines programmed to think and learn. Pretty cool, right? 🤖"] },

  { p: /love|like you|you'?re? my favorite/i,
    r: ["Aww, that means a lot! 💙 I enjoy chatting with you too!","That's sweet! I'm here whenever you need me 🌟"] },

  { p: /who (made|created|built|programmed) you/i,
    r: ["I was built as part of a CodSoft AI internship project! 🚀","A developer built me using Python + a sleek web interface!"] },

  { p: /.+/,
    r: [
      "Interesting! Tell me more 🤔",
      "Hmm, I'm not sure about that one. Could you rephrase?",
      "That's a new one for me! I'm still learning 🧠",
      "I didn't quite catch that. Try asking differently?",
      "Fascinating input! My circuits are processing... 💭"
    ]}
];

function getReply(input) {
  for (const rule of RULES) {
    if (rule.p.test(input)) {
      return rule.r[Math.floor(Math.random() * rule.r.length)];
    }
  }
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, sender) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const initial = sender === 'bot' ? 'N' : 'U';
  div.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot typing'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">N</div>
    <div><div class="msg-bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('suggestions').style.display = 'none';
  addMessage(text, 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMessage(getReply(text), 'bot');
  }, 600 + Math.random() * 600);
}

function sendSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent.replace(/^[^\w]+/, '').trim();
  sendMessage();
}
</script>
</body>
</html>
